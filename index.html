<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Inventario de Espacio</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
      padding: 15px;
      margin: 0 auto;
      max-width: 500px; /* centra y se ve tipo app */
    }

    h2 {
      color: #d0021b;
      text-align: center;
      margin-bottom: 20px;
    }

    select {
      display: block;
      width: 100%;
      padding: 14px;
      margin-bottom: 15px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
      background-color: #fff;
    }

    select:focus {
      outline: none;
      border-color: #d0021b;
    }

    #resultado {
      margin-top: 20px;
      background: #ffffff;
      padding: 15px;
      border-radius: 8px;
      font-size: 16px;
    }

    ul {
      padding-left: 20px;
    }

    li {
      margin-bottom: 8px;
    }

    @media (max-width: 480px) {
      h2 {
        font-size: 22px;
      }

      select {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

  <h2>Inventario de Espacio</h2>

  <select id="asesor">
    <option value="">Selecciona Asesor</option>
  </select>

  <select id="tienda">
    <option value="">Selecciona Tienda</option>
  </select>

  <div id="resultado"></div>

  <script>
    // 🔴 URL JSON DE TU GOOGLE SHEETS
    const URL_SHEET = "https://opensheet.elk.sh/1t17jVqWg1232INurXLCWUF6ya1483ZU8TYNp8F48Cbo/Hoja%201";

    let datos = [];

    const asesorSelect = document.getElementById("asesor");
    const tiendaSelect = document.getElementById("tienda");
    const resultadoDiv = document.getElementById("resultado");

    fetch(URL_SHEET)
      .then(res => res.json())
      .then(data => {
        datos = data;
        cargarAsesores();
      });

    // 🔹 Cargar asesores únicos
    function cargarAsesores() {
      const asesores = [...new Set(datos.map(d => d.Asesor))];

      asesores.forEach(asesor => {
        const option = document.createElement("option");
        option.value = asesor;
        option.textContent = asesor;
        asesorSelect.appendChild(option);
      });
    }

    // 🔹 Cuando cambia el asesor
    asesorSelect.addEventListener("change", () => {
      tiendaSelect.innerHTML = '<option value="">Selecciona Tienda</option>';
      resultadoDiv.innerHTML = "";

      if (!asesorSelect.value) return;

      const tiendas = [...new Set(
        datos
          .filter(d => d.Asesor === asesorSelect.value)
          .map(d => d.Tienda)
      )];

      tiendas.forEach(tienda => {
        const option = document.createElement("option");
        option.value = tienda;
        option.textContent = tienda;
        tiendaSelect.appendChild(option);
      });
    });

    // 🔹 Cuando cambia la tienda
    tiendaSelect.addEventListener("change", () => {
      resultadoDiv.innerHTML = "";

      if (!tiendaSelect.value) return;

      const resultado = datos.filter(d =>
        d.Asesor === asesorSelect.value &&
        d.Tienda === tiendaSelect.value
      );

      if (resultado.length === 0) {
        resultadoDiv.innerHTML = "<p>No hay información disponible</p>";
        return;
      }

      let html = "<h3>Exhibidor</h3><ul>";
      resultado.forEach(r => {
        html += `<li>${r.Exhibidor}</li>`;
      });
      html += "</ul>";

      resultadoDiv.innerHTML = html;
    });
  </script>

</body>
</html>
